<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modo Zen | Don't Think</title>
    <link rel="stylesheet" href="../assets/output.css" />
</head>
<style>
    a[aria-current="page"] {
        background-color: #7c3aed;
        color: white;
        box-shadow: 0 4px 6px rgba(124, 58, 237, 0.5);
    }
</style>


<body id="cuerpo"
    class="bg-gradient-to-br from-purple-200 via-pink-100 to-yellow-100 min-h-screen flex flex-col items-center px-4 py-10 font-sans relative">

    <!-- Encabezado -->
    <header class="text-center mt-20 mb-10">
        <h1 class="text-purple-800 text-4xl drop-shadow-sm font-bold">🌿 Modo Zen</h1>
        <p class="text-purple-600 text-lg mt-2">Elige cómo te sientes y recibe una frase que te acompañe</p>
    </header>

    <nav class="mb-10">
        <ul class="flex justify-center gap-3 flex-wrap">
            <li>
                <a href="../index.html" class="px-4 py-2 text-sm text-purple-700 bg-white bg-opacity-60 backdrop-blur-md rounded-full shadow-sm
                hover:bg-opacity-90 hover:text-purple-900
                transition-all">
                    🧩 Decide
                </a>
            </li>
            <li>
                <a href="zen.html" class="px-4 py-2 text-sm text-purple-700 bg-white bg-opacity-60 backdrop-blur-md rounded-full shadow-sm
                hover:bg-opacity-90 hover:text-purple-900
                transition-all" aria-current="page">
                    🌿 Modo Zen
                </a>
            </li>
            <li>
                <a href="medita.html" class="px-4 py-2 text-sm text-purple-700 bg-white bg-opacity-60 backdrop-blur-md rounded-full shadow-sm
                hover:bg-opacity-90 hover:text-purple-900
                transition-all">
                    Medita
                </a>
            </li>
        </ul>
    </nav>


    <main class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md text-center space-y-6">
        <!-- Emociones organizadas -->
        <section class="grid grid-cols-2 sm:grid-cols-3 gap-4 text-sm">
            <!-- Positivas -->
            <div class="col-span-3 text-left text-purple-700 font-bold mt-2">🌤️ Positivas</div>
            <button onclick="mostrarFrase('feliz')"
                class="bg-yellow-200 hover:bg-yellow-300 text-yellow-900 py-2 rounded-xl font-semibold transition">😊
                Feliz</button>
            <button onclick="mostrarFrase('inspirado')"
    class="bg-orange-200 hover:bg-orange-300 text-orange-900 py-2 rounded-xl font-semibold transition">💡 Inspirado</button>

            <button onclick="mostrarFrase('motivado')"
                class="bg-green-200 hover:bg-green-300 text-green-900 py-2 rounded-xl font-semibold transition">💪
                Motivado</button>

            <!-- Negativas -->
            <div class="col-span-3 text-left text-purple-700 font-bold mt-4">🌧️ Negativas</div>
            <button onclick="mostrarFrase('triste')"
                class="bg-blue-200 hover:bg-blue-300 text-blue-900 py-2 rounded-xl font-semibold transition">😢
                Triste</button>
            <button onclick="mostrarFrase('ansioso')"
                class="bg-purple-200 hover:bg-purple-300 text-purple-900 py-2 rounded-xl font-semibold transition">😰
                Ansioso</button>
            <button onclick="mostrarFrase('frustrado')"
                class="bg-red-200 hover:bg-red-300 text-red-900 py-2 rounded-xl font-semibold transition">😤
                Frustrado</button>

            <!-- Neutras o introspectivas -->
            <div class="col-span-3 text-left text-purple-700 font-bold mt-4">🌫️ Introspectivas</div>
            <button onclick="mostrarFrase('perdido')"
                class="bg-pink-200 hover:bg-pink-300 text-pink-900 py-2 rounded-xl font-semibold transition">🌀 Sin
                rumbo</button>
            <button onclick="mostrarFrase('confundido')"
                class="bg-gray-200 hover:bg-gray-300 text-gray-900 py-2 rounded-xl font-semibold transition">😶
                Confundido</button>
           <button onclick="mostrarFrase('reflexivo')"
    class="bg-indigo-100 hover:bg-indigo-200 text-indigo-900 py-2 rounded-xl font-semibold transition">🧠
    Reflexivo</button>

        </section>

        <!-- Resultado -->
        <div id="frase"
            class="mt-6 text-lg text-purple-700 italic min-h-[3rem] transition-opacity duration-300 ease-in-out"></div>
    </main>



    <!-- Footer -->
    <footer class="mt-10 text-center text-purple-600 text-sm">
        <p>© 2025 Don't Think. Hecho con 💛 por Aikarubi</p>
    </footer>

    <script>
        const frases = {
            feliz: [
                "Disfruta cada momento, estás brillando por dentro y por fuera.",
                "Tu energía positiva ilumina todo a tu alrededor. ☀️"
            ],
            inspirado: [
                "Una chispa de inspiración puede encender todo tu universo. 🌟",
                "Cuando la mente se abre, las ideas vuelan alto. 🌠"
            ],
            motivado: [
                "Aprovecha tu fuerza interior. Hoy es un buen día para avanzar. 🚀",
                "Tu motivación es contagiosa. No te detengas ahora."
            ],
            triste: [
                "Está bien sentirse así. Lo importante es no quedarse quieto. 🌧️",
                "Incluso los días grises tienen belleza si los miras con calma."
            ],
            ansioso: [
                "Respira. Estás aquí, estás a salvo, y todo pasará. 🫁",
                "No estás solo, y esto también tiene un final tranquilo."
            ],
            frustrado: [
                "La frustración es parte del crecimiento. Permítete sentirla. 💥",
                "Respira. Estás más cerca de superarlo de lo que crees."
            ],
            perdido: [
                "A veces perderse es la mejor forma de encontrarse. 🌌",
                "No tienes que tener todas las respuestas hoy."
            ],
            confundido: [
                "La confusión es solo el preludio de la claridad. 🌫️",
                "No saber es el inicio del descubrimiento."
            ],
            reflexivo: [
                "A veces, pensar en silencio es el mayor acto de claridad. 🧠",
                "Cada pensamiento profundo te acerca más a ti mismo."
            ]
        };


const fondos = {
    feliz: "from-yellow-100 via-yellow-200 to-yellow-300",
    inspirado: "from-yellow-100 via-orange-200 to-pink-200",
    motivado: "from-green-100 via-green-200 to-green-300",
    triste: "from-blue-100 via-blue-200 to-blue-300",
    ansioso: "from-purple-100 via-purple-200 to-purple-300",
    frustrado: "from-red-100 via-red-200 to-red-300",
    perdido: "from-pink-100 via-pink-200 to-pink-300",
    confundido: "from-gray-100 via-gray-200 to-gray-300",
    reflexivo: "from-slate-100 via-indigo-100 to-blue-200"
};


        function mostrarFrase(emocion) {
            const fraseEl = document.getElementById("frase");
            const opciones = frases[emocion];
            const fondo = fondos[emocion];
            const cuerpo = document.getElementById("cuerpo");

            const aleatoria = opciones[Math.floor(Math.random() * opciones.length)];
            fraseEl.textContent = `"${aleatoria}"`;

            // Quita clases previas de fondo y añade nuevas
            cuerpo.className = `bg-gradient-to-br ${fondo} min-h-screen flex flex-col items-center px-4 py-10 font-sans relative`;
        }
    </script>

</body>

</html>
