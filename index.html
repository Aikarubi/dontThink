<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Don't Think</title>
  <link rel="stylesheet" href="./assets/output.css" />
</head>
<body class="bg-gradient-to-br from-purple-200 via-pink-100 to-yellow-100 min-h-screen flex flex-col items-center justify-center px-4 py-10 font-sans">

  <header class="text-center mb-10">
    <h1 class="text-purple-800 text-4xl drop-shadow-sm font-bold">🧠 Don't Think</h1>
    <p class="text-purple-600 text-lg mt-2">Libera tu mente, decide sin pensar</p>
  </header>

  <main>
    <form>
      <label for="decision">¿Qué necesitas decidir?</label>
      <input type="text" id="decision" name="decision" required placeholder="Ej: ¿Qué como hoy?" />

      <label for="categoria">Selecciona una categoría</label>
      <select id="categoria" name="categoria" required>
        <option value="" disabled selected>Elige una categoría</option>
        <option value="comida">Comida</option>
        <option value="ocio">Ocio</option>
      </select>

      <button type="submit">¡Decime por mí!</button>
    </form>
  </main>

  <section aria-live="polite">
    <h2>Resultado:</h2>
    <p>Hoy toca... <span class="respuesta">¡Pedir comida china!</span></p>
  </section>

  <aside>
    <p>"Decidir menos, vivir más."</p>
  </aside>

  <footer>
    <p>© 2025 Don't Think. Hecho con ❤️ por Aikarubi</p>
  </footer>

</body>
</html>
